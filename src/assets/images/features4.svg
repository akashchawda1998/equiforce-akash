<svg width="600" height="320" viewBox="0 0 600 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f1f35"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="320" fill="url(#bg4)" rx="16"/>

  <!-- Left System Box -->
  <rect x="40" y="45" width="170" height="200" rx="10" fill="url(#boxGrad)" stroke="#1e3a5f" stroke-width="1.5"/>
  <rect x="40" y="45" width="170" height="32" rx="10" fill="#d97706" opacity="0.2"/>
  <rect x="40" y="65" width="170" height="12" fill="url(#boxGrad)"/>
  <text x="125" y="67" fill="#d97706" font-size="11" font-family="monospace" text-anchor="middle" font-weight="bold">SYSTEM A</text>

  <!-- System A rows -->
  <text x="60" y="100" fill="#94a3b8" font-size="9" font-family="monospace">Trade #1001</text>
  <text x="185" y="100" fill="#34d399" font-size="9" font-family="monospace" text-anchor="end">$12,500</text>
  <line x1="55" y1="106" x2="200" y2="106" stroke="#1e3a5f" stroke-width="0.5"/>

  <text x="60" y="124" fill="#94a3b8" font-size="9" font-family="monospace">Trade #1002</text>
  <text x="185" y="124" fill="#34d399" font-size="9" font-family="monospace" text-anchor="end">$8,750</text>
  <line x1="55" y1="130" x2="200" y2="130" stroke="#1e3a5f" stroke-width="0.5"/>

  <text x="60" y="148" fill="#94a3b8" font-size="9" font-family="monospace">Trade #1003</text>
  <text x="185" y="148" fill="#f87171" font-size="9" font-family="monospace" text-anchor="end">$5,200</text>
  <line x1="55" y1="154" x2="200" y2="154" stroke="#1e3a5f" stroke-width="0.5"/>

  <text x="60" y="172" fill="#94a3b8" font-size="9" font-family="monospace">Trade #1004</text>
  <text x="185" y="172" fill="#34d399" font-size="9" font-family="monospace" text-anchor="end">$21,000</text>
  <line x1="55" y1="178" x2="200" y2="178" stroke="#1e3a5f" stroke-width="0.5"/>

  <text x="60" y="196" fill="#94a3b8" font-size="9" font-family="monospace">Trade #1005</text>
  <text x="185" y="196" fill="#34d399" font-size="9" font-family="monospace" text-anchor="end">$3,300</text>
  <line x1="55" y1="202" x2="200" y2="202" stroke="#1e3a5f" stroke-width="0.5"/>

  <text x="60" y="228" fill="#94a3b8" font-size="9" font-family="monospace">TOTAL</text>
  <text x="185" y="228" fill="#d97706" font-size="10" font-family="monospace" text-anchor="end" font-weight="bold">$50,750</text>

  <!-- Right System Box -->
  <rect x="390" y="45" width="170" height="200" rx="10" fill="url(#boxGrad)" stroke="#1e3a5f" stroke-width="1.5"/>
  <rect x="390" y="45" width="170" height="32" rx="10" fill="#007CF0" opacity="0.2"/>
  <rect x="390" y="65" width="170" height="12" fill="url(#boxGrad)"/>
  <text x="475" y="67" fill="#38bdf8" font-size="11" font-family="monospace" text-anchor="middle" font-weight="bold">SYSTEM B</text>

  <!-- System B rows -->
  <text x="410" y="100" fill="#94a3b8" font-size="9" font-family="monospace">Trade #1001</text>
  <text x="545" y="100" fill="#34d399" font-size="9" font-family="monospace" text-anchor="end">$12,500</text>
  <line x1="405" y1="106" x2="552" y2="106" stroke="#1e3a5f" stroke-width="0.5"/>

  <text x="410" y="124" fill="#94a3b8" font-size="9" font-family="monospace">Trade #1002</text>
  <text x="545" y="124" fill="#34d399" font-size="9" font-family="monospace" text-anchor="end">$8,750</text>
  <line x1="405" y1="130" x2="552" y2="130" stroke="#1e3a5f" stroke-width="0.5"/>

  <text x="410" y="148" fill="#94a3b8" font-size="9" font-family="monospace">Trade #1003</text>
  <text x="545" y="148" fill="#fbbf24" font-size="9" font-family="monospace" text-anchor="end">$5,180</text>
  <line x1="405" y1="154" x2="552" y2="154" stroke="#1e3a5f" stroke-width="0.5"/>

  <text x="410" y="172" fill="#94a3b8" font-size="9" font-family="monospace">Trade #1004</text>
  <text x="545" y="172" fill="#34d399" font-size="9" font-family="monospace" text-anchor="end">$21,000</text>
  <line x1="405" y1="178" x2="552" y2="178" stroke="#1e3a5f" stroke-width="0.5"/>

  <text x="410" y="196" fill="#94a3b8" font-size="9" font-family="monospace">Trade #1005</text>
  <text x="545" y="196" fill="#34d399" font-size="9" font-family="monospace" text-anchor="end">$3,300</text>
  <line x1="405" y1="202" x2="552" y2="202" stroke="#1e3a5f" stroke-width="0.5"/>

  <text x="410" y="228" fill="#94a3b8" font-size="9" font-family="monospace">TOTAL</text>
  <text x="545" y="228" fill="#38bdf8" font-size="10" font-family="monospace" text-anchor="end" font-weight="bold">$50,730</text>

  <!-- Center reconciliation engine -->
  <circle cx="300" cy="145" r="36" fill="#111827" stroke="#d97706" stroke-width="1.5" filter="url(#glow4)"/>
  <text x="300" y="140" fill="#d97706" font-size="9" font-family="monospace" text-anchor="middle" font-weight="bold">RECON</text>
  <text x="300" y="153" fill="#d97706" font-size="9" font-family="monospace" text-anchor="middle">ENGINE</text>

  <!-- Arrows left to center -->
  <path d="M214,120 L258,130" stroke="url(#arrowGrad)" stroke-width="2" marker-end="url(#arrow)" fill="none" stroke-dasharray="3,2" opacity="0.8"/>
  <path d="M214,145 L263,143" stroke="url(#arrowGrad)" stroke-width="2" fill="none" stroke-dasharray="3,2" opacity="0.8"/>
  <path d="M214,170 L258,156" stroke="url(#arrowGrad)" stroke-width="2" fill="none" stroke-dasharray="3,2" opacity="0.8"/>

  <!-- Arrows center to right -->
  <path d="M337,130 L384,120" stroke="url(#arrowGrad)" stroke-width="2" fill="none" stroke-dasharray="3,2" opacity="0.8"/>
  <path d="M337,143 L384,145" stroke="url(#arrowGrad)" stroke-width="2" fill="none" stroke-dasharray="3,2" opacity="0.8"/>
  <path d="M337,156 L384,170" stroke="url(#arrowGrad)" stroke-width="2" fill="none" stroke-dasharray="3,2" opacity="0.8"/>

  <!-- Discrepancy badge -->
  <rect x="240" y="200" width="120" height="24" rx="12" fill="#f59e0b" opacity="0.2"/>
  <text x="300" y="216" fill="#fbbf24" font-size="10" font-family="monospace" text-anchor="middle">⚠ BREAK: $20</text>

  <!-- Bottom label -->
  <line x1="60" y1="280" x2="540" y2="280" stroke="#1e3a5f" stroke-width="1"/>
  <text x="300" y="302" fill="#94a3b8" font-size="12" font-family="monospace" text-anchor="middle" letter-spacing="2">RECONCILIATION</text>
</svg>
